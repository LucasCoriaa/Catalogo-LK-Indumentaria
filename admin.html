<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>LK Admin — Panel de Gestión</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@300;400;500;600;700&family=Barlow+Condensed:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy: #0a0f1e;
      --navy-mid: #111827;
      --navy-light: #1e2d4a;
      --navy-card: #141c2e;
      --blue-accent: #1d4ed8;
      --blue-glow: #3b82f6;
      --white: #f8faff;
      --white-muted: #9aa5c0;
      --gold: #f59e0b;
      --red: #ef4444;
      --green: #22c55e;
      --border: rgba(255,255,255,0.07);
      --border-strong: rgba(255,255,255,0.12);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Barlow', sans-serif;
      background: var(--navy);
      color: var(--white);
      min-height: 100vh;
      overflow-x: hidden;
    }
    input, select, textarea, button { font-family: 'Barlow', sans-serif; }

    /* ── LOGIN SCREEN ── */
    #loginScreen {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      background: radial-gradient(ellipse 70% 50% at 50% 40%, rgba(29,78,216,0.18) 0%, transparent 70%), var(--navy);
    }
    .login-box {
      background: var(--navy-card);
      border: 1px solid var(--border-strong);
      border-radius: 20px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 380px;
      text-align: center;
      box-shadow: 0 32px 80px rgba(0,0,0,0.5);
    }
    .login-icon {
      width: 64px; height: 64px;
      background: rgba(29,78,216,0.2);
      border: 1px solid rgba(59,130,246,0.3);
      border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 1.5rem;
      font-size: 1.8rem;
    }
    .login-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2rem;
      letter-spacing: 0.08em;
      margin-bottom: 0.4rem;
    }
    .login-title span { color: var(--blue-glow); }
    .login-sub { color: var(--white-muted); font-size: 0.85rem; margin-bottom: 2rem; }
    .login-field {
      width: 100%;
      background: var(--navy-mid);
      border: 1px solid var(--border-strong);
      border-radius: 10px;
      padding: 13px 16px;
      color: var(--white);
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
      margin-bottom: 1rem;
      letter-spacing: 0.1em;
    }
    .login-field:focus { border-color: var(--blue-glow); }
    .login-btn {
      width: 100%;
      padding: 14px;
      background: var(--blue-accent);
      border: none;
      border-radius: 10px;
      color: var(--white);
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.1rem;
      letter-spacing: 0.1em;
      cursor: pointer;
      transition: background 0.2s;
    }
    .login-btn:hover { background: var(--blue-glow); }
    .login-error {
      color: var(--red);
      font-size: 0.82rem;
      margin-top: 0.75rem;
      display: none;
    }

    /* ── MAIN APP ── */
    #adminApp { display: none; }

    /* ── HEADER ── */
    .admin-header {
      position: sticky; top: 0; z-index: 100;
      background: rgba(10,15,30,0.96);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      padding: 0 1.25rem;
      display: flex; align-items: center;
      justify-content: space-between;
      height: 60px;
      gap: 1rem;
    }
    .admin-logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.3rem;
      letter-spacing: 0.08em;
      display: flex; align-items: center; gap: 8px;
    }
    .admin-logo span { color: var(--blue-glow); }
    .admin-logo small {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--white-muted);
      background: rgba(29,78,216,0.2);
      border: 1px solid rgba(59,130,246,0.25);
      padding: 2px 8px;
      border-radius: 4px;
    }
    .header-actions { display: flex; gap: 8px; align-items: center; }
    .btn-store {
      display: flex; align-items: center; gap: 6px;
      padding: 8px 14px;
      background: rgba(34,197,94,0.12);
      border: 1px solid rgba(34,197,94,0.3);
      border-radius: 8px;
      color: var(--green);
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.15s;
    }
    .btn-store:hover { background: rgba(34,197,94,0.2); }
    .btn-logout {
      padding: 8px 14px;
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.25);
      border-radius: 8px;
      color: var(--red);
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-logout:hover { background: rgba(239,68,68,0.2); }

    /* ── STATS BAR ── */
    .stats-bar {
      display: flex; gap: 1px;
      background: var(--border);
      border-bottom: 1px solid var(--border);
    }
    .stat-card {
      flex: 1;
      padding: 1rem;
      background: var(--navy-card);
      text-align: center;
    }
    .stat-card-num {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.8rem;
      line-height: 1;
      color: var(--white);
    }
    .stat-card-num.blue { color: var(--blue-glow); }
    .stat-card-num.green { color: var(--green); }
    .stat-card-num.red { color: var(--red); }
    .stat-card-label {
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--white-muted);
      margin-top: 2px;
    }

    /* ── TOOLBAR ── */
    .admin-toolbar {
      padding: 1rem 1.25rem;
      display: flex; gap: 10px; align-items: center;
    }
    .toolbar-search {
      flex: 1;
      background: var(--navy-card);
      border: 1px solid var(--border-strong);
      border-radius: 10px;
      padding: 10px 14px;
      color: var(--white);
      font-size: 0.88rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .toolbar-search:focus { border-color: var(--blue-glow); }
    .toolbar-search::placeholder { color: var(--white-muted); }
    .btn-add {
      display: flex; align-items: center; gap: 6px;
      padding: 10px 18px;
      background: var(--blue-accent);
      border: none;
      border-radius: 10px;
      color: var(--white);
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1rem;
      letter-spacing: 0.08em;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.2s;
      flex-shrink: 0;
    }
    .btn-add:hover { background: var(--blue-glow); }

    /* ── PRODUCT LIST ── */
    .product-list {
      padding: 0 1.25rem 6rem;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .admin-card {
      background: var(--navy-card);
      border: 1px solid var(--border);
      border-radius: 14px;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px;
      transition: border-color 0.2s;
    }
    .admin-card:hover { border-color: var(--border-strong); }
    .admin-card-img {
      width: 64px; height: 64px;
      border-radius: 10px;
      background: linear-gradient(135deg, #1a2540 0%, #0f1929 100%);
      overflow: hidden;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
    }
    .admin-card-img img {
      width: 80%; height: 80%; object-fit: contain;
    }
    .admin-card-info { flex: 1; min-width: 0; }
    .admin-card-name {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--white);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 2px;
    }
    .admin-card-meta {
      font-size: 0.72rem;
      color: var(--blue-glow);
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 4px;
    }
    .admin-card-price {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.05rem;
      letter-spacing: 0.04em;
      color: var(--white);
    }
    .stock-pills { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 4px; }
    .stock-pill {
      font-size: 0.62rem;
      font-weight: 700;
      padding: 2px 6px;
      border-radius: 4px;
      letter-spacing: 0.06em;
    }
    .stock-pill.in { background: rgba(34,197,94,0.15); color: var(--green); border: 1px solid rgba(34,197,94,0.25); }
    .stock-pill.out { background: rgba(255,255,255,0.04); color: var(--white-muted); border: 1px solid var(--border); }
    .admin-card-actions { display: flex; flex-direction: column; gap: 6px; flex-shrink: 0; }
    .btn-edit, .btn-delete {
      width: 36px; height: 36px;
      border: none; border-radius: 8px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s;
      font-size: 0.9rem;
    }
    .btn-edit {
      background: rgba(59,130,246,0.12);
      border: 1px solid rgba(59,130,246,0.25);
      color: var(--blue-glow);
    }
    .btn-edit:hover { background: rgba(59,130,246,0.25); }
    .btn-delete {
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.2);
      color: var(--red);
    }
    .btn-delete:hover { background: rgba(239,68,68,0.2); }

    /* ── EMPTY STATE ── */
    .empty-state {
      text-align: center;
      padding: 4rem 2rem;
      color: var(--white-muted);
    }
    .empty-state-icon { font-size: 3rem; margin-bottom: 1rem; opacity: 0.4; }

    /* ── MODAL OVERLAY ── */
    .modal-overlay {
      position: fixed; inset: 0; z-index: 500;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(6px);
      display: flex; align-items: flex-end; justify-content: center;
      opacity: 0; pointer-events: none;
      transition: opacity 0.25s;
    }
    .modal-overlay.open { opacity: 1; pointer-events: all; }

    .modal-sheet {
      width: 100%; max-width: 600px;
      background: var(--navy-mid);
      border-radius: 20px 20px 0 0;
      border-top: 1px solid var(--border-strong);
      max-height: 92vh;
      display: flex; flex-direction: column;
      transform: translateY(100%);
      transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
    }
    .modal-overlay.open .modal-sheet { transform: translateY(0); }

    .modal-handle {
      width: 40px; height: 4px;
      background: var(--border-strong);
      border-radius: 2px;
      margin: 10px auto 0;
      flex-shrink: 0;
    }
    .modal-header {
      padding: 1rem 1.25rem 0.75rem;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .modal-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.4rem;
      letter-spacing: 0.06em;
    }
    .modal-close {
      width: 34px; height: 34px;
      background: var(--navy-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--white);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem;
      transition: background 0.15s;
    }
    .modal-close:hover { background: var(--red); border-color: var(--red); }

    .modal-body {
      flex: 1;
      overflow-y: auto;
      padding: 1.25rem;
      padding-bottom: 0.5rem;
    }
    .modal-footer {
      padding: 1rem 1.25rem 1.5rem;
      display: flex; gap: 10px;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    /* ── FORM ── */
    .form-section {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--white-muted);
      margin: 1.25rem 0 0.75rem;
      padding-bottom: 6px;
      border-bottom: 1px solid var(--border);
    }
    .form-section:first-child { margin-top: 0; }
    .form-row { margin-bottom: 0.85rem; }
    .form-row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 0.85rem; }
    label {
      display: block;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--white-muted);
      margin-bottom: 5px;
    }
    .form-input, .form-select, .form-textarea {
      width: 100%;
      background: var(--navy-card);
      border: 1px solid var(--border-strong);
      border-radius: 8px;
      padding: 10px 12px;
      color: var(--white);
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .form-input:focus, .form-select:focus, .form-textarea:focus { border-color: var(--blue-glow); }
    .form-select option { background: var(--navy-mid); }
    .form-textarea { resize: vertical; min-height: 70px; }

    /* ── IMAGE INPUT ── */
    .img-input-wrap { display: flex; flex-direction: column; gap: 8px; }
    .img-preview {
      width: 100%; height: 140px;
      background: linear-gradient(135deg, #1a2540, #0f1929);
      border-radius: 10px;
      border: 1px dashed var(--border-strong);
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
      position: relative;
    }
    .img-preview img { max-width: 100%; max-height: 100%; object-fit: contain; }
    .img-preview-placeholder { color: var(--white-muted); font-size: 0.8rem; text-align: center; }
    .img-preview-placeholder span { font-size: 2rem; display: block; margin-bottom: 4px; opacity: 0.4; }
    .img-input-tabs { display: flex; gap: 6px; }
    .img-tab {
      flex: 1; padding: 8px;
      background: var(--navy-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--white-muted);
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.78rem; font-weight: 700;
      letter-spacing: 0.04em;
      cursor: pointer; text-align: center;
      transition: all 0.15s;
    }
    .img-tab.active { background: rgba(29,78,216,0.2); border-color: var(--blue-accent); color: var(--white); }
    .img-url-field { display: none; }
    .img-url-field.show { display: block; }
    .img-upload-btn {
      width: 100%;
      padding: 10px;
      background: var(--navy-card);
      border: 1px dashed var(--border-strong);
      border-radius: 8px;
      color: var(--white-muted);
      font-size: 0.85rem;
      cursor: pointer;
      text-align: center;
      transition: border-color 0.15s, color 0.15s;
      display: none;
    }
    .img-upload-btn.show { display: block; }
    .img-upload-btn:hover { border-color: var(--blue-glow); color: var(--white); }
    #imgFileInput { display: none; }

    /* ── STOCK GRID ── */
    .stock-section { margin-bottom: 0.75rem; }
    .stock-label-row {
      display: flex; align-items: center;
      font-size: 0.72rem; font-weight: 700;
      letter-spacing: 0.08em; text-transform: uppercase;
      color: var(--white-muted);
      margin-bottom: 8px;
    }
    .stock-label-row .ver-tag {
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 0.65rem;
      margin-left: 8px;
    }
    .ver-tag.fan { background: rgba(29,78,216,0.15); color: var(--blue-glow); border: 1px solid rgba(59,130,246,0.2); }
    .ver-tag.jugador { background: rgba(245,158,11,0.15); color: var(--gold); border: 1px solid rgba(245,158,11,0.2); }
    .stock-sizes { display: flex; gap: 6px; flex-wrap: wrap; }
    .size-toggle {
      position: relative;
      display: flex; align-items: center;
    }
    .size-toggle input[type="checkbox"] { display: none; }
    .size-toggle label {
      width: 42px; height: 36px;
      background: var(--navy-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.78rem; font-weight: 700;
      letter-spacing: 0.04em;
      color: var(--white-muted);
      cursor: pointer;
      transition: all 0.15s;
      margin-bottom: 0;
      text-transform: none;
    }
    .size-toggle input:checked + label {
      background: rgba(34,197,94,0.18);
      border-color: var(--green);
      color: var(--green);
    }

    /* ── DORSALES ── */
    .dorsales-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 10px; }
    .dorsal-row {
      display: flex; gap: 8px; align-items: center;
      background: var(--navy-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 10px;
    }
    .dorsal-num-input {
      width: 60px;
      background: var(--navy-mid);
      border: 1px solid var(--border-strong);
      border-radius: 6px;
      padding: 7px 8px;
      color: var(--white);
      font-size: 0.9rem;
      font-weight: 700;
      text-align: center;
      outline: none;
    }
    .dorsal-name-input {
      flex: 1;
      background: var(--navy-mid);
      border: 1px solid var(--border-strong);
      border-radius: 6px;
      padding: 7px 10px;
      color: var(--white);
      font-size: 0.9rem;
      outline: none;
    }
    .dorsal-num-input:focus, .dorsal-name-input:focus { border-color: var(--blue-glow); }
    .btn-remove-dorsal {
      width: 28px; height: 28px;
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.2);
      border-radius: 6px;
      color: var(--red);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.9rem;
      flex-shrink: 0;
    }
    .btn-add-dorsal {
      display: flex; align-items: center; gap: 6px;
      padding: 8px 14px;
      background: rgba(59,130,246,0.1);
      border: 1px dashed rgba(59,130,246,0.3);
      border-radius: 8px;
      color: var(--blue-glow);
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.82rem; font-weight: 700;
      cursor: pointer;
      width: 100%;
      justify-content: center;
      transition: background 0.15s;
    }
    .btn-add-dorsal:hover { background: rgba(59,130,246,0.18); }

    /* ── FOOTER BUTTONS ── */
    .btn-cancel {
      flex: 1; padding: 14px;
      background: var(--navy-card);
      border: 1px solid var(--border-strong);
      border-radius: 10px;
      color: var(--white-muted);
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1rem;
      letter-spacing: 0.08em;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-cancel:hover { background: var(--navy-light); }
    .btn-save {
      flex: 2; padding: 14px;
      background: var(--blue-accent);
      border: none;
      border-radius: 10px;
      color: var(--white);
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1rem;
      letter-spacing: 0.08em;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-save:hover { background: var(--blue-glow); }

    /* ── DELETE CONFIRM ── */
    .confirm-overlay {
      position: fixed; inset: 0; z-index: 600;
      background: rgba(0,0,0,0.75);
      backdrop-filter: blur(6px);
      display: flex; align-items: center; justify-content: center;
      padding: 2rem;
      opacity: 0; pointer-events: none;
      transition: opacity 0.2s;
    }
    .confirm-overlay.open { opacity: 1; pointer-events: all; }
    .confirm-box {
      background: var(--navy-mid);
      border: 1px solid rgba(239,68,68,0.3);
      border-radius: 16px;
      padding: 1.75rem;
      max-width: 340px; width: 100%;
      text-align: center;
      transform: scale(0.92);
      transition: transform 0.2s cubic-bezier(0.34,1.56,0.64,1);
    }
    .confirm-overlay.open .confirm-box { transform: scale(1); }
    .confirm-icon { font-size: 2.5rem; margin-bottom: 1rem; }
    .confirm-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.4rem;
      letter-spacing: 0.06em;
      margin-bottom: 0.5rem;
    }
    .confirm-msg { color: var(--white-muted); font-size: 0.88rem; margin-bottom: 1.5rem; line-height: 1.5; }
    .confirm-msg strong { color: var(--white); }
    .confirm-btns { display: flex; gap: 10px; }
    .btn-confirm-cancel {
      flex: 1; padding: 12px;
      background: var(--navy-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--white-muted);
      font-family: 'Bebas Neue', sans-serif;
      font-size: 0.9rem;
      letter-spacing: 0.06em;
      cursor: pointer;
    }
    .btn-confirm-delete {
      flex: 1; padding: 12px;
      background: var(--red);
      border: none;
      border-radius: 8px;
      color: var(--white);

function saveProducts() {

// ── Stats ─────────────────────────────────────────────────────────────────────
function renderStats() {
  var total = adminProducts.length;
  var inStock = adminProducts.filter(function(p) {
    return hasAnyStockAdmin(p, 'fan') || hasAnyStockAdmin(p, 'jugador');
  }).length;
  var noStock = total - inStock;
  document.getElementById('statsBar').innerHTML =
    '<div class="stat-card"><div class="stat-card-num blue">' + total + '</div><div class="stat-card-label">Total</div></div>' +
    '<div class="stat-card"><div class="stat-card-num green">' + inStock + '</div><div class="stat-card-label">Con Stock</div></div>' +
    '<div class="stat-card"><div class="stat-card-num red">' + noStock + '</div><div class="stat-card-label">Sin Stock</div></div>';
}

function hasAnyStockAdmin(p, ver) {
  var st = ver === 'jugador' ? (p.stockJugador || {}) : (p.stock || {});
  return Object.keys(st).some(function(k) { return st[k] === true; });
}

// ── Render list ───────────────────────────────────────────────────────────────
function filterList(q) {
  q = (q || '').toLowerCase().trim();
  filteredProducts = q
    ? adminProducts.filter(function(p) {
        return p.name.toLowerCase().indexOf(q) >= 0
            || (p.club || '').toLowerCase().indexOf(q) >= 0
            || (p.type || '').toLowerCase().indexOf(q) >= 0;
      })
    : adminProducts.slice();
  renderList(true);
}

function renderList(filtered) {
  var list = filtered ? filteredProducts : adminProducts;
  if (!filtered) filteredProducts = adminProducts.slice();
  var container = document.getElementById('productList');

  if (!list.length) {
    container.innerHTML = '<div class="empty-state"><div class="empty-state-icon">📦</div><p>No hay productos todavía.<br>Tocá <strong>+ Nuevo</strong> para agregar el primero.</p></div>';
    return;
  }

  container.innerHTML = list.map(function(p) {
    var fanStock = p.stock || {};
    var jugStock = p.stockJugador || {};
    var allSizes = SIZES.concat(Object.keys(fanStock).filter(function(s) { return SIZES.indexOf(s) < 0; }));
    var pills = allSizes.map(function(sz) {
      var inFan = fanStock[sz] === true;
      var inJug = jugStock[sz] === true;
      if (!inFan && !inJug) return '';
      return '<span class="stock-pill in">' + sz + '</span>';
    }).filter(Boolean).join('');
    if (!pills) pills = '<span class="stock-pill out">Sin stock</span>';

    return '<div class="admin-card">' +
      '<div class="admin-card-img"><img src="' + (p.img || '') + '" alt="" onerror="this.style.display=\'none\'"></div>' +
      '<div class="admin-card-info">' +
        '<div class="admin-card-name">' + escHtml(p.name) + '</div>' +
        '<div class="admin-card-meta">' + escHtml(p.club || '') + ' · ' + (p.type === 'short' ? 'Short' : 'Camiseta') + '</div>' +
        '<div class="admin-card-price">$' + (p.price || 0).toLocaleString('es-AR') + ' ARS</div>' +
        '<div class="stock-pills">' + pills + '</div>' +
      '</div>' +
      '<div class="admin-card-actions">' +
        '<button class="btn-edit" onclick="openModal(\'' + p.id + '\')" title="Editar">✏️</button>' +
        '<button class="btn-delete" onclick="openConfirm(\'' + p.id + '\')" title="Eliminar">🗑️</button>' +
      '</div>' +
    '</div>';
  }).join('');
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Modal ─────────────────────────────────────────────────────────────────────
function openModal(productId) {
  editingId = productId || null;
  var p = productId ? adminProducts.find(function(x) { return x.id === productId; }) : null;
  imgMode = 'url';
  currentImgData = p ? (p.img || '') : '';

  document.getElementById('modalTitle').textContent = p ? 'Editar Producto' : 'Nuevo Producto';
  document.getElementById('modalBody').innerHTML = buildForm(p);
  document.getElementById('productModal').classList.add('open');
  document.body.style.overflow = 'hidden';

  // Listeners de imagen
  document.querySelectorAll('.img-tab').forEach(function(tab) {
    tab.addEventListener('click', function() {
      imgMode = tab.dataset.mode;
      document.querySelectorAll('.img-tab').forEach(function(t) { t.classList.remove('active'); });
      tab.classList.add('active');
      document.querySelector('.img-url-field').classList.toggle('show', imgMode === 'url');
      document.querySelector('.img-upload-btn').classList.toggle('show', imgMode === 'upload');
    });
  });

  var urlInput = document.getElementById('imgUrl');
  if (urlInput) {
    urlInput.addEventListener('input', function() {
      currentImgData = this.value;
      updateImgPreview();
    });
  }
}

function buildForm(p) {
  var fanStock = p ? (p.stock || {}) : {};
  var jugStock = p ? (p.stockJugador || {}) : {};
  var dorsales = p ? (p.dorsales || []) : [];
  var tags = p ? (p.tags || []).join(', ') : '';

  var sizesHtml = function(prefix, stockObj) {
    return SIZES.map(function(sz) {
      var checked = stockObj[sz] === true ? 'checked' : '';
      return '<div class="size-toggle">' +
        '<input type="checkbox" id="' + prefix + sz + '" name="' + prefix + sz + '" ' + checked + '>' +
        '<label for="' + prefix + sz + '">' + sz + '</label>' +
        '</div>';
    }).join('');
  };

  var dorsalesHtml = dorsales.map(function(d, i) {
    return '<div class="dorsal-row" id="drow-' + i + '">' +
      '<input class="dorsal-num-input" type="number" placeholder="Nº" value="' + (d.numero || '') + '" data-dorsal-num="' + i + '">' +
      '<input class="dorsal-name-input" type="text" placeholder="Nombre jugador" value="' + escHtml(d.nombre || '') + '" data-dorsal-name="' + i + '">' +
      '<button class="btn-remove-dorsal" onclick="removeDorsalRow(' + i + ')">✕</button>' +
      '</div>';
  }).join('');

  return '<div class="form-section">Información básica</div>' +

    '<div class="form-row"><label>Nombre del producto</label>' +
    '<input class="form-input" type="text" id="fName" value="' + escHtml(p ? p.name : '') + '" placeholder="Ej: Camiseta Barcelona Titular"></div>' +

    '<div class="form-row-2">' +
      '<div><label>Club / Marca</label><input class="form-input" type="text" id="fClub" value="' + escHtml(p ? (p.club||'') : '') + '" placeholder="Barcelona"></div>' +
      '<div><label>Tipo</label><select class="form-select" id="fType">' +
        '<option value="camiseta"' + (!p || p.type==='camiseta' ? ' selected' : '') + '>Camiseta</option>' +
        '<option value="short"' + (p && p.type==='short' ? ' selected' : '') + '>Short</option>' +
      '</select></div>' +
    '</div>' +

    '<div class="form-row-2">' +
      '<div><label>Precio (ARS)</label><input class="form-input" type="number" id="fPrice" value="' + (p ? p.price : '') + '" placeholder="35000"></div>' +
      '<div><label>Badge (etiqueta)</label><select class="form-select" id="fBadge">' +
        '<option value=""' + (!p || !p.badge ? ' selected' : '') + '>Sin badge</option>' +
        '<option value="new"' + (p && p.badge==='new' ? ' selected' : '') + '>New</option>' +
        '<option value="Retro"' + (p && p.badge==='Retro' ? ' selected' : '') + '>Retro</option>' +
        '<option value="Sale"' + (p && p.badge==='Sale' ? ' selected' : '') + '>Sale</option>' +
      '</select></div>' +
    '</div>' +

    '<div class="form-row"><label>Tags (separados por coma)</label>' +
    '<input class="form-input" type="text" id="fTags" value="' + escHtml(tags) + '" placeholder="argentina, retro"></div>' +

    '<div class="form-section">Imagen</div>' +
    '<div class="img-input-wrap">' +
      '<div class="img-preview" id="imgPreview">' +
        (currentImgData
          ? '<img src="' + escHtml(currentImgData) + '" alt="">'
          : '<div class="img-preview-placeholder"><span>🖼️</span>Sin imagen</div>') +
      '</div>' +
      '<div class="img-input-tabs">' +
        '<button class="img-tab active" data-mode="url">🔗 URL</button>' +
        '<button class="img-tab" data-mode="upload">📷 Subir foto</button>' +
      '</div>' +
      '<input class="form-input img-url-field show" type="text" id="imgUrl" value="' + escHtml(p ? (p.img||'') : '') + '" placeholder="https://... o img/archivo.jpeg">' +
      '<button class="img-upload-btn" onclick="document.getElementById(\'imgFileInput\').click()">📷 Tocar para seleccionar foto del celular</button>' +
      '<input type="file" id="imgFileInput" accept="image/*" onchange="handleImgUpload(this)">' +
    '</div>' +

    '<div class="form-section">Stock — Versión Fan</div>' +
    '<div class="stock-section"><div class="stock-sizes">' + sizesHtml('fan_', fanStock) + '</div></div>' +

    '<div class="form-section">Stock — Versión Jugador</div>' +
    '<div class="stock-section"><div class="stock-sizes">' + sizesHtml('jug_', jugStock) + '</div></div>' +

    '<div class="form-section">Dorsales disponibles <span style="font-weight:400;text-transform:none;letter-spacing:0;font-family:Barlow,sans-serif;font-size:0.7rem;color:var(--white-muted)">(opcional)</span></div>' +
    '<div class="dorsales-list" id="dorsalesList">' + dorsalesHtml + '</div>' +
    '<button class="btn-add-dorsal" onclick="addDorsalRow()">＋ Agregar dorsal</button>' +
    '<div style="height:1rem"></div>';
}

function updateImgPreview() {
  var prev = document.getElementById('imgPreview');
  if (!prev) return;
  if (currentImgData) {
    prev.innerHTML = '<img src="' + escHtml(currentImgData) + '" alt="" onerror="this.style.display=\'none\'">';
  } else {
    prev.innerHTML = '<div class="img-preview-placeholder"><span>🖼️</span>Sin imagen</div>';
  }
}

function handleImgUpload(input) {
  if (!input.files || !input.files[0]) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    currentImgData = e.target.result;
    updateImgPreview();
  };
  reader.readAsDataURL(input.files[0]);
}

var dorsalRowCount = 0;
function addDorsalRow() {
  dorsalRowCount++;
  var idx = Date.now();
  var row = document.createElement('div');
  row.className = 'dorsal-row';
  row.id = 'drow-new-' + idx;
  row.innerHTML =
    '<input class="dorsal-num-input" type="number" placeholder="Nº" data-dorsal-num="new-' + idx + '">' +
    '<input class="dorsal-name-input" type="text" placeholder="Nombre jugador" data-dorsal-name="new-' + idx + '">' +
    '<button class="btn-remove-dorsal" onclick="this.parentElement.remove()">✕</button>';
  document.getElementById('dorsalesList').appendChild(row);
}

function removeDorsalRow(i) {
  var row = document.getElementById('drow-' + i);
  if (row) row.remove();
}

function closeModal() {
  document.getElementById('productModal').classList.remove('open');
  document.body.style.overflow = '';
  editingId = null;
}

// ── Save product ──────────────────────────────────────────────────────────────
function saveProduct() {
  var name  = (document.getElementById('fName').value || '').trim();
  var club  = (document.getElementById('fClub').value || '').trim();
  var type  = document.getElementById('fType').value;
  var price = parseInt(document.getElementById('fPrice').value) || 0;
  var badge = document.getElementById('fBadge').value;
  var tagsRaw = (document.getElementById('fTags').value || '').trim();
  var tags  = tagsRaw ? tagsRaw.split(',').map(function(t) { return t.trim(); }).filter(Boolean) : [];

  if (!name) { showAdminToast('Ingresá un nombre para el producto.', 'error'); return; }
  if (!price) { showAdminToast('Ingresá un precio válido.', 'error'); return; }

  // Image
  var imgSrc = currentImgData || '';
  if (imgMode === 'url') {
    var urlVal = (document.getElementById('imgUrl').value || '').trim();
    if (urlVal) imgSrc = urlVal;
  }

  // Stock fan
  var fanStock = {};
  SIZES.forEach(function(sz) {
    var cb = document.getElementById('fan_' + sz);
    if (cb) fanStock[sz] = cb.checked;
  });

  // Stock jugador
  var jugStock = {};
  SIZES.forEach(function(sz) {
    var cb = document.getElementById('jug_' + sz);
    if (cb) jugStock[sz] = cb.checked;
  });

  // Dorsales
  var dorsales = [];
  document.querySelectorAll('[data-dorsal-num]').forEach(function(numInput) {
    var key = numInput.dataset.dorsalNum;
    var nameInput = document.querySelector('[data-dorsal-name="' + key + '"]');
    var num = parseInt(numInput.value);
    var nom = nameInput ? (nameInput.value || '').trim() : '';
    if (num && nom) {
      dorsales.push({ numero: num, nombre: nom });
    }
  });

  // Badge type
  var badgeType = badge === 'Retro' ? 'retro' : (badge === 'new' || badge === 'New' ? 'new' : '');

  var product = {
    id: editingId || generateId(name),
    name: name,
    club: club,
    type: type,
    tags: tags,
    price: price,
    badge: badge || null,
    badgeType: badgeType || null,
    img: imgSrc,
    stock: fanStock,
    stockJugador: jugStock,
    dorsales: dorsales
  };

  if (editingId) {
    var idx = adminProducts.findIndex(function(p) { return p.id === editingId; });
    if (idx >= 0) adminProducts[idx] = product;
  } else {
    adminProducts.unshift(product);
  }

  saveProducts();
  renderList();
  renderStats();
  closeModal();
  showAdminToast(editingId ? 'Producto actualizado ✓' : 'Producto creado ✓', 'success');
}

function generateId(name) {
  return name.toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
    .replace(/[^a-z0-9]+/g, '-')
    .replace(/^-|-$/g, '')
    .substring(0, 40)
    + '-' + Date.now().toString(36);
}

// ── Delete ────────────────────────────────────────────────────────────────────
function openConfirm(productId) {
  deleteId = productId;
  var p = adminProducts.find(function(x) { return x.id === productId; });
  document.getElementById('confirmProductName').textContent = p ? p.name : 'este producto';
  document.getElementById('confirmOverlay').classList.add('open');
}

function closeConfirm() {
  document.getElementById('confirmOverlay').classList.remove('open');
  deleteId = null;
}

function confirmDelete() {
  if (!deleteId) return;
  adminProducts = adminProducts.filter(function(p) { return p.id !== deleteId; });
  saveProducts();
  renderList();
  renderStats();
  closeConfirm();
  showAdminToast('Producto eliminado.', 'success');
}

// ── Reset to originals ────────────────────────────────────────────────────────
function confirmReset() {
  localStorage.removeItem(STORAGE_KEY);
  adminProducts = [];
  importFromStoreJS();
}

// ── Toast ─────────────────────────────────────────────────────────────────────
function showAdminToast(msg, type) {
  var old = document.querySelector('.a-toast');
  if (old) old.remove();
  var t = document.createElement('div');
  t.className = 'a-toast ' + (type || '');
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(function() { t.remove(); }, 3000);
}

// ── Close modal on backdrop click ─────────────────────────────────────────────
document.getElementById('productModal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});
document.getElementById('confirmOverlay').addEventListener('click', function(e) {
  if (e.target === this) closeConfirm();
});
</script>
</body>
